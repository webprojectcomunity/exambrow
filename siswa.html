<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Monitoring Siswa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-100 p-3 sm:p-6 font-sans antialiased min-h-screen">
    <div class="max-w-7xl mx-auto space-y-4">
        
        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-2">
            <h1 class="text-xl sm:text-2xl font-bold text-slate-800 flex items-center gap-2">
                <i class="fa-solid fa-users text-indigo-600"></i> Dashboard Monitoring Siswa
            </h1>
            <p class="text-xs text-slate-500 hidden sm:block">Manajemen status kelulusan & blokir peserta</p>
        </div>

        <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200/60 flex flex-col md:flex-row gap-3">
            <div class="relative flex-1">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-slate-400">
                    <i class="fa-solid fa-magnifying-glass text-sm"></i>
                </span>
                <input id="cari" oninput="jalankanFilter()" class="w-full pl-9 pr-4 py-2 text-sm border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all" placeholder="Cari nama, Kelas atau NIS siswa...">
            </div>
            
            <div class="flex gap-2 w-full md:w-auto">
                <div class="relative flex-1 md:w-48">
                    <select id="status" onchange="jalankanFilter()" class="w-full bg-white border border-slate-200 px-3 py-2 text-sm rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 appearance-none cursor-pointer text-slate-700">
                        <option value="">Semua Status</option>
                        <option value="Aktif">Aktif</option>
                        <option value="Tidak Aktif">Tidak Aktif</option>
                    </select>
                    <span class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-slate-400 text-xs">
                        <i class="fa-solid fa-chevron-down"></i>
                    </span>
                </div>
                
                <button onclick="muatDataSiswa()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 text-sm font-medium rounded-lg shadow-sm transition-all flex items-center justify-center gap-2 min-w-[100px]">
                    <i class="fa-solid fa-arrows-rotate"></i> Refresh
                </button>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-slate-200/60 overflow-hidden">
            <div class="overflow-x-auto block w-full whitespace-nowrap">
                <table class="w-full text-left border-collapse min-w-[800px]">
                    <thead class="bg-slate-800 text-white text-xs uppercase tracking-wider">
                        <tr>
                            <th class="p-3 pl-4">Nama Siswa</th>
                            <th class="p-3 w-32">NIS</th>
                            <th class="p-3 w-28">Kelas</th>
                            <th class="p-3 w-32">Status</th>
                            <th class="p-3">Catatan</th>
                            <th class="p-3 w-32">Sisa Waktu</th>
                            <th class="p-3 w-40 text-center">Aksi Panel</th>
                        </tr>
                    </thead>
                    <tbody id="tabel" class="text-xs sm:text-sm text-slate-700 divide-y divide-slate-100">
                        <tr>
                            <td colspan="7" class="text-center py-10 text-slate-400 whitespace-normal">
                                <i class="fa-solid fa-spinner fa-spin mr-2 text-lg"></i>Menghubungkan ke API Google Sheets...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        
    </div>

    <script>
        // ======================================
        // KONFIGURASI API
        // ======================================
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbygo9uVEhnY6M8QefD7HEQV57DWTZOE3ACPQhl6b80lvzxGuliQULaE5yKG_guqoDdyPQ/exec";
        let databaseSiswa = [];

        // ======================================
        // LOAD DATA SISWA REALTIME
        // ======================================
        async function muatDataSiswa() {
            const tbody = document.getElementById("tabel");
            tbody.innerHTML = `
                <tr>
                    <td colspan="7" class="text-center py-10 text-slate-400 whitespace-normal">
                        <i class="fa-solid fa-spinner fa-spin mr-2 text-indigo-500"></i>Memuat data terbaru dari server...
                    </td>
                </tr>
            `;

            try {
                const response = await fetch(`${WEB_APP_URL}?action=all_siswa`);
                const data = await response.json();
                console.log("Response API:", data);

                if (data.error) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="7" class="text-center text-rose-500 font-medium py-10 whitespace-normal">
                                <i class="fa-solid fa-circle-exclamation mr-1"></i> ${data.error}
                            </td>
                        </tr>
                    `;
                    return;
                }

                databaseSiswa = data;
                render(databaseSiswa);

            } catch (err) {
                console.error(err);
                tbody.innerHTML = `
                    <tr>
                        <td colspan="7" class="text-center text-rose-500 font-medium py-10 whitespace-normal">
                            <i class="fa-solid fa-triangle-exclamation mr-1"></i> Gagal menghubungi server backend.
                        </td>
                    </tr>
                `;
            }
        }

        // ======================================
        // RENDER DATA KE DATA TABEL
        // ======================================
        function render(data) {
            const tbody = document.getElementById("tabel");
            tbody.innerHTML = "";

            if (!data || data.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="7" class="text-center py-10 text-slate-400 whitespace-normal">
                            <i class="fa-solid fa-folder-open mr-1"></i> Tidak ada data siswa ditemukan.
                        </td>
                    </tr>
                `;
                return;
            }

            data.forEach((siswa) => {
                const statusBadge = siswa.status === "Aktif"
                    ? `<span class="inline-flex items-center gap-1 bg-emerald-50 text-emerald-700 font-medium px-2 py-0.5 rounded text-xs border border-emerald-100"><span class="w-1.5 h-1.5 bg-emerald-500 rounded-full"></span>Aktif</span>`
                    : `<span class="inline-flex items-center gap-1 bg-rose-50 text-rose-700 font-medium px-2 py-0.5 rounded text-xs border border-rose-100"><span class="w-1.5 h-1.5 bg-rose-500 rounded-full"></span>Tidak Aktif</span>`;

                tbody.innerHTML += `
                <tr class="hover:bg-slate-50/80 transition-colors">
                    <td class="p-3 pl-4 font-bold text-slate-800 whitespace-normal min-w-[180px]">${siswa.nama || "-"}</td>
                    <td class="p-3 font-mono text-slate-600">${siswa.nis || "-"}</td>
                    <td class="p-3 font-medium text-slate-600">${siswa.kelas || "-"}</td>
                    <td class="p-3">${statusBadge}</td>
                    <td class="p-3 text-xs text-slate-500 whitespace-normal min-w-[150px]">${siswa.catatan || "-"}</td>
                    <td class="p-3 font-semibold text-amber-600">${siswa.sisa_waktu || "-"}</td>
                    <td class="p-3 text-center">
                        <div class="inline-flex gap-1 shadow-sm rounded-md overflow-hidden">
                            <button onclick="editSiswa(${siswa.row})" class="bg-white hover:bg-slate-50 text-blue-600 p-2 text-xs border border-slate-200 transition-colors" title="Edit Nama">
                                <i class="fa-solid fa-pen-to-square"></i>
                            </button>
                            <button onclick="hapusSiswa(${siswa.row})" class="bg-white hover:bg-slate-50 text-rose-600 p-2 text-xs border-y border-slate-200 transition-colors" title="Hapus Siswa">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                            <button onclick="blokir('${siswa.nama}','${siswa.nis}')" class="bg-white hover:bg-slate-50 text-orange-500 p-2 text-xs border border-slate-200 transition-colors" title="Blokir Peserta">
                                <i class="fa-solid fa-lock"></i>
                            </button>
                            <button onclick="unlock('${siswa.nis}')" class="bg-white hover:bg-slate-50 text-emerald-600 p-2 text-xs border-y border-r border-slate-200 rounded-r-md transition-colors" title="Buka Blokir">
                                <i class="fa-solid fa-lock-open"></i>
                            </button>
                        </div>
                    </td>
                </tr>
                `;
            });
        }

        // ======================================
        // LOGIC LIVE FILTER (CARI & STATUS)
        // ======================================
       // ======================================
// LOGIC LIVE FILTER (CARI & STATUS)
// ======================================
function jalankanFilter() {
    const keyword = document.getElementById("cari").value.toLowerCase().trim();
    const statusTarget = document.getElementById("status").value;

    const hasilFilter = databaseSiswa.filter(siswa => {
        const namaSiswa = (siswa.nama || "").toLowerCase();
        const nisSiswa = (siswa.nis || "").toLowerCase();
        const kelasSiswa = (siswa.kelas || "").toLowerCase(); // Tambahkan ini
        const statusSiswa = siswa.status || "";

        // Logika: Pencarian cocok jika keyword ada di NAMA, NIS, atau KELAS
        const cocokKeyword = namaSiswa.includes(keyword) || 
                             nisSiswa.includes(keyword) || 
                             kelasSiswa.includes(keyword); // Tambahkan filter kelas
                             
        const cocokStatus = statusTarget === "" || statusSiswa === statusTarget;

        return cocokKeyword && cocokStatus;
    });

    render(hasilFilter);
}

        // ======================================
        // EVENT EDIT SISWA VIA PROMPT
        // ======================================
        async function editSiswa(row) {
            const nama = prompt("Masukkan nama baru siswa:");
            if (!nama || nama.trim() === "") return;

            const fd = new FormData();
            fd.append("action", "edit_siswa");
            fd.append("row", row);
            fd.append("nama", nama.trim());

            try {
                const res = await fetch(WEB_APP_URL, { method: "POST", body: fd });
                alert(await res.text());
                muatDataSiswa();
            } catch (err) {
                alert("Gagal memperbarui data: " + err.message);
            }
        }

        // ======================================
        // EVENT HAPUS SISWA
        // ======================================
        async function hapusSiswa(row) {
            if (!confirm("Apakah Anda yakin ingin menghapus data siswa ini secara permanen?")) return;

            const fd = new FormData();
            fd.append("action", "delete_siswa");
            fd.append("row", row);

            try {
                const res = await fetch(WEB_APP_URL, { method: "POST", body: fd });
                alert(await res.text());
                muatDataSiswa();
            } catch (err) {
                alert("Gagal menghapus data: " + err.message);
            }
        }

        // ======================================
        // EVENT BLOKIR SISWA
        // ======================================
        async function blokir(nama, nis) {
            const fd = new FormData();
            fd.append("action", "blokir_siswa");
            fd.append("nama", nama);
            fd.append("nis", nis);
            fd.append("alasan", "Blokir oleh Admin");

            try {
                const res = await fetch(WEB_APP_URL, { method: "POST", body: fd });
                alert(await res.text());
                muatDataSiswa();
            } catch (err) {
                alert("Gagal memblokir peserta: " + err.message);
            }
        }

        // ======================================
        // EVENT UNLOCK SISWA
        // ======================================
        async function unlock(nis) {
            const fd = new FormData();
            fd.append("action", "unlock_siswa");
            fd.append("nis", nis);

            try {
                const res = await fetch(WEB_APP_URL, { method: "POST", body: fd });
                alert(await res.text());
                muatDataSiswa();
            } catch (err) {
                alert("Gagal membuka blokir: " + err.message);
            }
        }

        // Jalankan sinkronisasi awal saat halaman terbuka
        window.onload = () => {
            muatDataSiswa();
        };
    </script>
</body>
</html>
