<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - Portal Ujian</title>

<style>
body {
    font-family: Arial;
    background: #f4f4f9;
    margin: 0;
    padding: 15px;
}

.container {
    background: white;
    padding: 20px;
    border-radius: 10px;
    max-width: 900px;
    margin: auto;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

h2, h3 {
    text-align: center;
}

input {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    padding: 10px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.save-btn {
    width: 100%;
    background: #007bff;
    color: white;
    font-weight: bold;
}

.preview {
    width: 100%;
    height: 160px;
    background-size: cover;
    background-position: center;
    border-radius: 8px;
    margin-bottom: 15px;
    border: 1px solid #ddd;
}

.table-container {
    overflow-x: auto;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
}

th, td {
    border: 1px solid #ddd;
    padding: 8px;
    text-align: center;
    font-size: 14px;
}

td {
    max-width: 200px;
    word-break: break-word;
}

img {
    max-width: 80px;
    border-radius: 6px;
}

.action-btn {
    padding: 5px 8px;
    font-size: 12px;
    margin: 2px;
}

.edit { background: orange; color: white; }
.delete { background: red; color: white; }

</style>
</head>

<body>

<div class="container">

<h2>Admin Panel</h2>

<input type="text" id="formLink" placeholder="Link Google Form">
<input type="text" id="token" placeholder="Token Ujian">
<input type="file" id="bgFile" accept="image/*">

<div class="preview" id="preview"></div>

<button class="save-btn" onclick="simpanData()">Simpan / Update</button>

<h3>Data Tersimpan</h3>

<div class="table-container">
<table>
<thead>
<tr>
<th>Form</th>
<th>Token</th>
<th>Background</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbygo9uVEhnY6M8QefD7HEQV57DWTZOE3ACPQhl6b80lvzxGuliQULaE5yKG_guqoDdyPQ/exec";

let base64Image = "";
let editRow = null;

// ================= PREVIEW =================
document.getElementById("bgFile").addEventListener("change", function(e){
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = function(){
        base64Image = reader.result;
        document.getElementById("preview").style.backgroundImage = `url(${base64Image})`;
    }

    if(file) reader.readAsDataURL(file);
});

// ================= LOAD DATA =================
async function loadData() {
    try {

        const res = await fetch(API_URL + "?action=all");
        const data = await res.json();

        console.log("DATA:", data);

        // ❗ cek jika error dari GAS
        if (!Array.isArray(data)) {
            alert("Gagal load data: " + (data.error || "Unknown error"));
            return;
        }

        const tbody = document.getElementById("tableBody");
        tbody.innerHTML = "";

        if (data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="4">Belum ada data</td></tr>`;
            return;
        }

        data.reverse().forEach(item => {

            const safeForm = encodeURIComponent(item.formLink);
            const safeToken = encodeURIComponent(item.token);
            const safeBg = encodeURIComponent(item.background);

            tbody.innerHTML += `
            <tr>
                <td>${item.formLink}</td>
                <td>${item.token}</td>
                <td>
                    ${item.background ? `<img src="${item.background}">` : "-"}
                </td>
                <td>
                    <button class="action-btn edit"
                        onclick="isiForm(${item.row}, decodeURIComponent('${safeForm}'), decodeURIComponent('${safeToken}'), decodeURIComponent('${safeBg}'))">
                        Edit
                    </button>

                    <button class="action-btn delete"
                        onclick="hapusData(${item.row})">
                        Hapus
                    </button>
                </td>
            </tr>
            `;
        });

    } catch (err) {
        console.error(err);
        alert("Gagal koneksi ke server!");
    }
}

// ================= EDIT =================
function isiForm(row, formLink, token, bg) {
    editRow = row;

    document.getElementById("formLink").value = formLink;
    document.getElementById("token").value = token;
    document.getElementById("preview").style.backgroundImage = `url(${bg})`;

    base64Image = "";
}

// ================= SIMPAN =================
async function simpanData() {

    const formLink = document.getElementById("formLink").value;
    const token = document.getElementById("token").value;

    if (!formLink || !token) {
        alert("Isi semua data!");
        return;
    }

    const formData = new URLSearchParams();

    if (editRow) {
        formData.append("action", "update");
        formData.append("row", editRow);
    } else {
        formData.append("action", "add");
    }

    formData.append("formLink", formLink);
    formData.append("token", token);

    if (base64Image) {
        formData.append("image", base64Image);
    }

    try {
        const res = await fetch(API_URL, {
            method: "POST",
            body: formData
        });

        const result = await res.text();
        console.log(result);

        alert("Berhasil disimpan!");
        resetForm();
        loadData();

    } catch (err) {
        console.error(err);
        alert("Gagal menyimpan!");
    }
}

// ================= HAPUS =================
async function hapusData(row) {

    if (!confirm("Yakin hapus data?")) return;

    const formData = new URLSearchParams();
    formData.append("action", "delete");
    formData.append("row", row);

    await fetch(API_URL, {
        method: "POST",
        body: formData
    });

    loadData();
}

// ================= RESET =================
function resetForm() {
    document.getElementById("formLink").value = "";
    document.getElementById("token").value = "";
    document.getElementById("preview").style.backgroundImage = "";
    document.getElementById("bgFile").value = "";
    base64Image = "";
    editRow = null;
}

// ================= INIT =================
loadData();

</script>

</body>
</html>
