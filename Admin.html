<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - Portal Ujian</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f4f9;
    margin: 0;
    padding: 15px;
}

.container {
    background: white;
    padding: 20px;
    border-radius: 10px;
    max-width: 1000px;
    margin: auto;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

h2, h3 {
    text-align: center;
    color: #333;
}

.form-group {
    margin-bottom: 12px;
}

label {
    font-size: 14px;
    font-weight: bold;
    color: #444;
    display: block;
    margin-bottom: 5px;
}

input {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
    box-sizing: border-box;
}

.row-inputs {
    display: flex;
    gap: 15px;
}

.row-inputs .form-group {
    flex: 1;
}

button {
    padding: 10px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
}

.save-btn {
    width: 100%;
    background: #007bff;
    color: white;
    font-size: 16px;
    margin-top: 10px;
}

.save-btn:hover {
    background: #0056b3;
}

.cancel-btn {
    width: 100%;
    background: #6c757d;
    color: white;
    font-size: 16px;
    margin-top: 8px;
    display: none;
}

.cancel-btn:hover {
    background: #5a6268;
}

/* BAGIAN KONTROL BG */
.bg-management-box {
    border: 1px solid #ddd;
    padding: 15px;
    border-radius: 8px;
    background: #fafafa;
    margin-top: 15px;
    margin-bottom: 15px;
}

.preview {
    width: 100%;
    height: 140px;
    background-size: cover;
    background-position: center;
    border-radius: 8px;
    margin-top: 10px;
    border: 1px dashed #ccc;
    background-color: #f0f0f0;
}

.table-container {
    overflow-x: auto;
    margin-top: 20px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    border: 1px solid #ddd;
    padding: 10px;
    text-align: center;
    font-size: 13px;
}

th {
    background-color: #f1f1f1;
}

td {
    max-width: 180px;
    word-break: break-word;
}

img {
    max-width: 70px;
    max-height: 70px;
    border-radius: 6px;
    object-fit: cover;
    display: block;
    margin: auto;
}

.action-btn {
    padding: 6px 10px;
    font-size: 12px;
    margin: 2px;
}

.edit { background: #ffc107; color: black; }
.edit:hover { background: #e0a800; }

.delete { background: #dc3545; color: white; }
.delete:hover { background: #c82333; }

.bg-upload { background: #28a745; color: white; }
.bg-upload:hover { background: #218838; }

.bg-delete { background: #fd7e14; color: white; }
.bg-delete:hover { background: #da680e; }
</style>
</head>

<body>

<div class="container">
    <h2>Admin Panel - Portal Ujian</h2>

    <!-- Input Data Utama Ujian -->
    <div class="form-group">
        <label for="formLink">Link Google Form</label>
        <input type="text" id="formLink" placeholder="https://docs.google.com/forms/.../viewform">
    </div>

    <div class="form-group">
        <label for="token">Token Ujian</label>
        <input type="text" id="token" placeholder="Contoh: uas2026">
    </div>

    <div class="row-inputs">
        <div class="form-group">
            <label for="mapel">Mata Pelajaran</label>
            <input type="text" id="mapel" placeholder="Contoh: Matematika Peminatan">
        </div>
        <div class="form-group">
            <label for="durasi">Durasi Waktu</label>
            <input type="text" id="durasi" placeholder="Contoh: 90 Menit">
        </div>
    </div>

    <!-- Kotak Manajemen File Terpisah -->
    <div class="bg-management-box">
        <label style="margin-bottom: 8px;">Pengaturan File Gambar Background</label>
        <input type="file" id="bgFile" accept="image/*">
        <div class="preview" id="preview"></div>
        <p id="bg-info-status" style="font-size: 11px; color: #666; margin: 5px 0 0 0;">
            *Gambar di atas hanya akan diproses jika Anda menekan tombol bertanda khusus hijau/oranye di tabel aksi data bawah.
        </p>
    </div>

    <button class="save-btn" onclick="simpanDataTeks()" id="btnSimpan">Simpan Data Baru</button>
    <button class="cancel-btn" onclick="resetForm()" id="btnBatal">Batal / Reset Mode</button>

    <h3>Data Konfigurasi Ujian Aktif</h3>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Mata Pelajaran</th>
                    <th>Durasi</th>
                    <th>Token</th>
                    <th>Form Link</th>
                    <th>Background</th>
                    <th>Aksi Kontrol</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="6">Memuat database cloud...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
// URL Web App dari Google Apps Script
const API_URL = "https://script.google.com/macros/s/AKfycbygo9uVEhnY6M8QefD7HEQV57DWTZOE3ACPQhl6b80lvzxGuliQULaE5yKG_guqoDdyPQ/exec";

let base64Image = "";
let editRow = null;

// ================= PREVIEW GAMBAR (LOKAL) =================
document.getElementById("bgFile").addEventListener("change", function(e){
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = function(){
        base64Image = reader.result;
        document.getElementById("preview").style.backgroundImage = `url(${base64Image})`;
    }

    if(file) reader.readAsDataURL(file);
});

// ================= LOAD DATABASE (GET) =================
async function loadData() {
    try {
        const res = await fetch(API_URL + "?action=all");
        const data = await res.json();

        const tbody = document.getElementById("tableBody");
        tbody.innerHTML = "";

        if (data.error) {
            tbody.innerHTML = `<tr><td colspan="6">Error: ${data.error}</td></tr>`;
            return;
        }

        if (!Array.isArray(data) || data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6">Belum ada konfigurasi terdaftar</td></tr>`;
            return;
        }

        // Tampilkan data terbaru di posisi paling atas (Reverse)
        data.reverse().forEach(item => {
            const safeForm = encodeURIComponent(item.formLink || "");
            const safeToken = encodeURIComponent(item.token || "");
            const safeMapel = encodeURIComponent(item.mapel || "");
            const safeDurasi = encodeURIComponent(item.durasi || "");
            const safeBg = encodeURIComponent(item.background || "");

            tbody.innerHTML += `
            <tr>
                <td><strong>${item.mapel || "-"}</strong></td>
                <td>${item.durasi || "-"}</td>
                <td><code style="background:#eee;padding:2px 6px;border-radius:4px">${item.token}</code></td>
                <td><a href="${item.formLink}" target="_blank">Buka Form</a></td>
                <td>
                    ${item.background && item.background !== "-" ? `<img src="${item.background}" alt="bg">` : "<em style='color:#999'>Polos</em>"}
                </td>
                <td>
                    <!-- Manajemen Teks -->
                    <button class="action-btn edit" title="Edit Data Teks"
                        onclick="isiForm(${item.row}, decodeURIComponent('${safeForm}'), decodeURIComponent('${safeToken}'), decodeURIComponent('${safeMapel}'), decodeURIComponent('${safeDurasi}'), decodeURIComponent('${safeBg}'))">
                        Edit Teks
                    </button>
                    <button class="action-btn delete" title="Hapus Baris Total"
                        onclick="hapusBarisTotal(${item.row})">
                        Hapus
                    </button>
                    <br>
                    <!-- Manajemen File Terpisah -->
                    <button class="action-btn bg-upload" title="Unggah Gambar di Atas Ke Baris Ini"
                        onclick="prosesUploadBgKhusus(${item.row})">
                        Sync BG
                    </button>
                    ${item.background && item.background !== "-" ? `
                        <button class="action-btn bg-delete" title="Hapus Gambar Saja"
                            onclick="prosesHapusBgKhusus(${item.row})">
                            Wipe BG
                        </button>
                    ` : ""}
                </td>
            </tr>
            `;
        });
    } catch (err) {
        console.error(err);
        document.getElementById("tableBody").innerHTML = `<tr><td colspan="6">Gagal sinkronisasi. Periksa jaringan API Web Apps.</td></tr>`;
    }
}

// ================= AMBIL DATA KE FORM UNTUK EDIT =================
function isiForm(row, formLink, token, mapel, durasi, bg) {
    editRow = row;

    document.getElementById("formLink").value = formLink;
    document.getElementById("token").value = token;
    document.getElementById("mapel").value = mapel;
    document.getElementById("durasi").value = durasi;
    
    if(bg && bg !== "undefined" && bg !== "-") {
        document.getElementById("preview").style.backgroundImage = `url(${bg})`;
    } else {
        document.getElementById("preview").style.backgroundImage = "";
    }

    document.getElementById("btnSimpan").innerText = "Update Teks Data (Row " + row + ")";
    document.getElementById("btnSimpan").style.background = "#fd7e14";
    document.getElementById("btnBatal").style.display = "block";
    
    // Jangan ganggu file lokal yang sedang dipilih antrean
    base64Image = ""; 
    document.getElementById("bgFile").value = "";
}

// ================= SIMPAN / UPDATE TEKS (POST) =================
async function simpanDataTeks() {
    const formLink = document.getElementById("formLink").value.trim();
    const token = document.getElementById("token").value.trim();
    const mapel = document.getElementById("mapel").value.trim();
    const durasi = document.getElementById("durasi").value.trim();
    const btnSimpan = document.getElementById("btnSimpan");

    if (!formLink || !token || !mapel || !durasi) {
        alert("Seluruh field teks utama wajib dilengkapi!");
        return;
    }

    btnSimpan.innerText = "Memproses Jaringan...";
    btnSimpan.disabled = true;

    const formData = new URLSearchParams();

    if (editRow) {
        formData.append("action", "update_text");
        formData.append("row", editRow);
    } else {
        formData.append("action", "add");
    }

    formData.append("formLink", formLink);
    formData.append("token", token);
    formData.append("mapel", mapel);
    formData.append("durasi", durasi);

    try {
        const res = await fetch(API_URL, { method: "POST", body: formData });
        const result = await res.text();

        if (result.includes("SUCCESS")) {
            alert("Data teks berhasil diperbarui ke Cloud!");
            resetForm();
            loadData();
        } else {
            alert("Respon Server: " + result);
        }
    } catch (err) {
        console.error(err);
        alert("Koneksi gagal terhubung ke Google Apps Script.");
    } finally {
        btnSimpan.disabled = false;
        btnSimpan.innerText = editRow ? "Update Teks Data" : "Simpan Data Baru";
    }
}

// ================= TERPISAH: UPLOAD/UPDATE BACKGROUND BARIS SPESIFIK =================
async function prosesUploadBgKhusus(row) {
    if (!base64Image) {
        alert("Pilih file gambar baru terlebih dahulu pada kotak penjelajah file di atas!");
        return;
    }

    if (!confirm(`Apakah Anda yakin ingin menimpa/mengisi background pada baris ${row}?`)) return;

    const btnSimpan = document.getElementById("btnSimpan");
    btnSimpan.disabled = true;

    const formData = new URLSearchParams();
    formData.append("action", "upload_bg");
    formData.append("row", row);
    formData.append("image", base64Image);

    try {
        const res = await fetch(API_URL, { method: "POST", body: formData });
        const result = await res.text();

        if (result.includes("SUCCESS")) {
            alert(`Sukses mengunggah background baru untuk data baris ${row}!`);
            document.getElementById("bgFile").value = "";
            base64Image = "";
            document.getElementById("preview").style.backgroundImage = "";
            loadData();
        } else {
            alert("Gagal upload: " + result);
        }
    } catch (err) {
        console.error(err);
        alert("Terjadi error saat mentransfer data gambar.");
    } finally {
        btnSimpan.disabled = false;
    }
}

// ================= TERPISAH: HAPUS BACKGROUND SAJA =================
async function prosesHapusBgKhusus(row) {
    if (!confirm(`Bersihkan file gambar latar belakang pada baris ${row}? File lama di Drive akan dibersihkan.`)) return;

    const formData = new URLSearchParams();
    formData.append("action", "delete_bg");
    formData.append("row", row);

    try {
        const res = await fetch(API_URL, { method: "POST", body: formData });
        const result = await res.text();

        if (result.includes("SUCCESS")) {
            alert("Gambar background baris terkait berhasil dihapus!");
            loadData();
        } else {
            alert("Gagal menghapus gambar: " + result);
        }
    } catch (err) {
        console.error(err);
        alert("Gagal mengirim perintah hapus gambar.");
    }
}

// ================= TOTAL HAPUS BARIS DATA =================
async function hapusBarisTotal(row) {
    if (!confirm(`PERINGATAN: Menghapus baris data ${row} secara total? File gambar terikat juga akan dibersihkan otomatis.`)) return;

    const formData = new URLSearchParams();
    formData.append("action", "delete");
    formData.append("row", row);

    try {
        const res = await fetch(API_URL, { method: "POST", body: formData });
        const result = await res.text();
        
        if (result.includes("SUCCESS")) {
            alert("Seluruh data baris berhasil dimusnahkan!");
            if(editRow === row) resetForm();
            loadData();
        } else {
            alert("Gagal: " + result);
        }
    } catch (err) {
        console.error(err);
        alert("Gagal berkomunikasi dengan server.");
    }
}

// ================= RESET / BERSIHKAN FORM INTERFACE =================
function resetForm() {
    document.getElementById("formLink").value = "";
    document.getElementById("token").value = "";
    document.getElementById("mapel").value = "";
    document.getElementById("durasi").value = "";
    document.getElementById("preview").style.backgroundImage = "";
    document.getElementById("bgFile").value = "";
    
    const btnSimpan = document.getElementById("btnSimpan");
    btnSimpan.innerText = "Simpan Data Baru";
    btnSimpan.style.background = "#007bff";
    document.getElementById("btnBatal").style.display = "none";
    
    base64Image = "";
    editRow = null;
}

// Jalankan otomatis saat halaman dirender admin
loadData();
</script>

</body>
</html>
