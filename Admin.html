<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - Portal Ujian</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f4f9;
    margin: 0;
    padding: 15px;
}

.container {
    background: white;
    padding: 20px;
    border-radius: 10px;
    max-width: 1000px;
    margin: auto;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

h2, h3 {
    text-align: center;
    color: #333;
}

.form-group {
    margin-bottom: 12px;
}

label {
    font-size: 14px;
    font-weight: bold;
    color: #444;
    display: block;
    margin-bottom: 5px;
}

input {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
    box-sizing: border-box;
}

.row-inputs {
    display: flex;
    gap: 15px;
}

.row-inputs .form-group {
    flex: 1;
}

button {
    padding: 10px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
}

.save-btn {
    width: 100%;
    background: #007bff;
    color: white;
    font-size: 16px;
    margin-top: 10px;
}

.save-btn:hover {
    background: #0056b3;
}

.cancel-btn {
    width: 100%;
    background: #6c757d;
    color: white;
    font-size: 16px;
    margin-top: 8px;
    display: none;
}

.cancel-btn:hover {
    background: #5a6268;
}

/* BAGIAN KONTROL BG */
.bg-management-box {
    border: 1px solid #ddd;
    padding: 15px;
    border-radius: 8px;
    background: #fafafa;
    margin-top: 15px;
    margin-bottom: 15px;
}

.preview {
    width: 100%;
    height: 140px;
    background-size: cover;
    background-position: center;
    border-radius: 8px;
    margin-top: 10px;
    border: 1px dashed #ccc;
    background-color: #f0f0f0;
}

.table-container {
    overflow-x: auto;
    margin-top: 20px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    border: 1px solid #ddd;
    padding: 10px;
    text-align: center;
    font-size: 13px;
}

th {
    background-color: #f1f1f1;
}

td {
    max-width: 180px;
    word-break: break-word;
}

img {
    max-width: 70px;
    max-height: 70px;
    border-radius: 6px;
    object-fit: cover;
    display: block;
    margin: auto;
}

.action-btn {
    padding: 6px 10px;
    font-size: 12px;
    margin: 2px;
}

.edit { background: #ffc107; color: black; }
.edit:hover { background: #e0a800; }

.delete { background: #dc3545; color: white; }
.delete:hover { background: #c82333; }

.bg-upload { background: #28a745; color: white; }
.bg-upload:hover { background: #218838; }

.bg-delete { background: #fd7e14; color: white; }
.bg-delete:hover { background: #da680e; }
</style>
</head>

<body>

<div class="container">
    <h2>Admin Panel - Portal Ujian</h2>

    <!-- Input Data Utama Ujian -->
    <div class="form-group">
        <label for="formLink">Link Google Form</label>
        <input type="text" id="formLink" placeholder="https://docs.google.com/forms/.../viewform">
    </div>

    <div class="form-group">
        <label for="token">Token Ujian</label>
        <input type="text" id="token" placeholder="Contoh: uas2026">
    </div>

    <div class="row-inputs">
        <div class="form-group">
            <label for="mapel">Mata Pelajaran</label>
            <input type="text" id="mapel" placeholder="Contoh: Matematika Peminatan">
        </div>
        <div class="form-group">
            <label for="durasi">Durasi Waktu</label>
            <input type="text" id="durasi" placeholder="Contoh: 90 Menit">
        </div>
    </div>

    <!-- Kotak Manajemen File Terpisah -->
    <div class="bg-management-box">
        <label style="margin-bottom: 8px;">Pengaturan File Gambar Background</label>
        <input type="file" id="bgFile" accept="image/*">
        <div class="preview" id="preview"></div>
        <p id="bg-info-status" style="font-size: 11px; color: #666; margin: 5px 0 0 0;">
            *Gambar di atas hanya akan diproses jika Anda menekan tombol bertanda khusus hijau/oranye di tabel aksi data bawah.
        </p>
    </div>

    <button class="save-btn" onclick="simpanDataTeks()" id="btnSimpan">Simpan Data Baru</button>
    <button class="cancel-btn" onclick="resetForm()" id="btnBatal">Batal / Reset Mode</button>

    <h3>Data Konfigurasi Ujian Aktif</h3>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Mata Pelajaran</th>
                    <th>Durasi</th>
                    <th>Token</th>
                    <th>Form Link</th>
                    <th>Background</th>
                    <th>Aksi Kontrol</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="6">Memuat database cloud...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
// URL Web App dari Google Apps Script
const API_URL = "https://script.google.com/macros/s/AKfycbygo9uVEhnY6M8QefD7HEQV57DWTZOE3ACPQhl6b80lvzxGuliQULaE5yKG_guqoDdyPQ/exec";

let base64Image = "";
let editRow = null;

// ================= AMBIL DATA UTAMA DARI SERVER =================
async function loadData() {
    const tableBody = document.getElementById("tableBody");
    
    try {
        const res = await fetch(`${API_URL}?action=all`);
        const data = await res.json();

        if (data.error) {
            tableBody.innerHTML = `<tr><td colspan="6" style="color:red;">Error: ${data.error}</td></tr>`;
            return;
        }

        if (data.length === 0) {
            tableBody.innerHTML = `<tr><td colspan="6">Belum ada data konfigurasi ujian di server.</td></tr>`;
            return;
        }

        tableBody.innerHTML = "";
        data.forEach(item => {
            const bgDisplay = item.background 
                ? `<a href="${item.background}" target="_blank"><img src="${item.background}" alt="BG"></a>` 
                : `<span style="color:#999; font-style:italic;">Default</span>`;

            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td><strong>${item.mapel}</strong></td>
                <td>${item.durasi}</td>
                <td><code style="background:#eee; padding:2px 6px; border-radius:4px; font-weight:bold;">${item.token}</code></td>
                <td style="font-size:11px; color:#555;">${item.formLink}</td>
                <td>${bgDisplay}</td>
                <td>
                    <button class="action-btn edit" onclick="masukModeEdit(${item.row}, '${btoa(encodeURIComponent(item.mapel))}', '${btoa(encodeURIComponent(item.durasi))}', '${btoa(encodeURIComponent(item.token))}', '${btoa(encodeURIComponent(item.formLink))}')">Edit Teks</button>
                    <button class="action-btn delete" onclick="hapusBarisTotal(${item.row})">Hapus</button>
                    <hr style="border:0; border-top:1px dashed #ccc; margin:4px 0;">
                    <button class="action-btn bg-upload" onclick="prosesUploadBgKhusus(${item.row})">Pasang BG</button>
                    <button class="action-btn bg-delete" onclick="hapusBgKhusus(${item.row})">Kosongkan BG</button>
                </td>
            `;
            tableBody.appendChild(tr);
        });

    } catch (err) {
        console.error(err);
        tableBody.innerHTML = `<tr><td colspan="6" style="color:red;">Gagal memuat data. Periksa koneksi internet / izin Web App.</td></tr>`;
    }
}

// ================= PREVIEW & AUTO COMPRESS GAMBAR (LOKAL) =================
document.getElementById("bgFile").addEventListener("change", function(e){
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(event){
        const img = new Image();
        img.onload = function() {
            const MAX_WIDTH = 1280;
            const MAX_HEIGHT = 1280;
            let width = img.width;
            let height = img.height;

            if (width > height) {
                if (width > MAX_WIDTH) {
                    height *= MAX_WIDTH / width;
                    width = MAX_WIDTH;
                }
            } else {
                if (height > MAX_HEIGHT) {
                    width *= MAX_HEIGHT / height;
                    height = MAX_HEIGHT;
                }
            }

            const canvas = document.createElement("canvas");
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, width, height);

            base64Image = canvas.toDataURL("image/jpeg", 0.75); 
            
            document.getElementById("preview").style.backgroundImage = `url(${base64Image})`;
            console.log("Gambar berhasil dikompresi untuk kestabilan upload.");
        };
        img.src = event.target.result;
    };
    reader.readAsDataURL(file);
});

// ================= EKSEKUSI DATA TEKS (SIMPAN / UPDATE) =================
// ================= EKSEKUSI DATA TEKS (SIMPAN / UPDATE) =================
async function simpanDataTeks() {
    const formLink = document.getElementById("formLink").value.trim();
    const token = document.getElementById("token").value.trim();
    const mapel = document.getElementById("mapel").value.trim();
    const durasi = document.getElementById("durasi").value.trim();

    if (!formLink || !token || !mapel || !durasi) {
        alert("Mohon lengkapi semua bidang data teks terlebih dahulu!");
        return;
    }

    const btnSimpan = document.getElementById("btnSimpan");
    const labelSblm = btnSimpan.innerText; // Menyimpan label tombol asli
    btnSimpan.disabled = true;
    btnSimpan.innerText = "Memproses...";

    // Diubah dari URLSearchParams menjadi Objek JSON biasa
    const payload = {
        action: editRow ? "update_text" : "add",
        formLink: formLink,
        token: token,
        mapel: mapel,
        durasi: durasi
    };
    
    if (editRow) {
        payload.row = editRow;
    }

    try {
        const res = await fetch(API_URL, { 
            method: "POST", 
            headers: {
                "Content-Type": "application/json" // Beritahu server bahwa ini data JSON asli
            },
            body: JSON.stringify(payload) // Konversi objek ke bentuk string JSON
        });
        const result = await res.text();

        if (result.includes("SUCCESS")) {
            alert(editRow ? "Data teks berhasil diperbarui!" : "Konfigurasi ujian baru berhasil ditambahkan!");
            resetForm();
            loadData();
        } else {
            alert("Respon Server: " + result);
        }
    } catch (err) {
        console.error(err);
        alert("Terjadi gangguan jaringan saat menyimpan data.");
    } finally {
        btnSimpan.disabled = false;
        btnSimpan.innerText = labelSblm; // Mengembalikan teks tombol ke semula
    }
}


// ================= MASUK MODE EDIT TEKS DATA =================
function masukModeEdit(row, mapelB64, durasiB64, tokenB64, formLinkB64) {
    editRow = row;
    
    document.getElementById("mapel").value = decodeURIComponent(atob(mapelB64));
    document.getElementById("durasi").value = decodeURIComponent(atob(durasiB64));
    document.getElementById("token").value = decodeURIComponent(atob(tokenB64));
    document.getElementById("formLink").value = decodeURIComponent(atob(formLinkB64));

    const btnSimpan = document.getElementById("btnSimpan");
    btnSimpan.innerText = "Update Teks Data (Baris " + row + ")";
    btnSimpan.style.background = "#ffc107";
    btnSimpan.style.color = "black";
    
    document.getElementById("btnBatal").style.display = "block";
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ================= TERPISAH: UPLOAD/UPDATE BACKGROUND BARIS SPESIFIK =================
// ================= TERPISAH: UPLOAD/UPDATE BACKGROUND BARIS SPESIFIK =================
async function prosesUploadBgKhusus(row) {
    if (!base64Image) {
        alert("Pilih file gambar baru terlebih dahulu pada kotak penjelajah file di atas!");
        return;
    }

    if (!confirm(`Apakah Anda yakin ingin menimpa/mengisi background pada baris ${row}?`)) return;

    const btnSimpan = document.getElementById("btnSimpan");
    const labelSblm = btnSimpan.innerText;
    btnSimpan.disabled = true;
    btnSimpan.innerText = "Mengunggah Gambar...";

    // SOLUSI: Menggunakan struktur objek JSON biasa yang dikirim mentah (raw payload)
    // Ini menghindari batasan limit karakter teks pada URLSearchParams
    const payload = {
        action: "upload_bg",
        row: row,
        image: base64Image // String base64 jpeg hasil kompresi canvas
    };

    try {
        const res = await fetch(API_URL, { 
            method: "POST", 
            // Mengirim dengan memicu e.postData.contents di Apps Script
            body: JSON.stringify(payload) 
        });
        const result = await res.text();

        if (result.includes("SUCCESS")) {
            alert(`Sukses mengunggah background baru untuk data baris ${row}!`);
            document.getElementById("bgFile").value = "";
            base64Image = "";
            document.getElementById("preview").style.backgroundImage = "";
            loadData();
        } else {
            alert("Gagal upload. Respon Server: " + result);
        }
    } catch (err) {
        console.error(err);
        alert("Terjadi kesalahan jaringan saat mentransfer data gambar.");
    } finally {
        btnSimpan.disabled = false;
        btnSimpan.innerText = labelSblm;
    }
}
// ================= KOSONGKAN BACKGROUND BARIS DATA =================
async function hapusBgKhusus(row) {
    if (!confirm(`Apakah Anda yakin ingin menghapus file background pada baris ${row} dan mengembalikannya ke default?`)) return;

    const formData = new URLSearchParams();
    formData.append("action", "delete_bg");
    formData.append("row", row);

    try {
        const res = await fetch(API_URL, { method: "POST", body: formData });
        const result = await res.text();
        
        if (result.includes("SUCCESS")) {
            alert("Background berhasil dikembalikan ke default!");
            loadData();
        } else {
            alert("Gagal: " + result);
        }
    } catch (err) {
        console.error(err);
        alert("Gagal terhubung dengan server cloud.");
    }
}

// ================= TOTAL HAPUS BARIS DATA =================
async function hapusBarisTotal(row) {
    if (!confirm(`PERINGATAN: Menghapus baris data ${row} secara total? File gambar terikat juga akan dibersihkan otomatis.`)) return;

    const formData = new URLSearchParams();
    formData.append("action", "delete");
    formData.append("row", row);

    try {
        const res = await fetch(API_URL, { method: "POST", body: formData });
        const result = await res.text();
        
        if (result.includes("SUCCESS")) {
            alert("Seluruh data baris berhasil dimusnahkan!");
            if(editRow === row) resetForm();
            loadData();
        } else {
            alert("Gagal: " + result);
        }
    } catch (err) {
        console.error(err);
        alert("Gagal berkomunikasi dengan server.");
    }
}

// ================= RESET / BERSIHKAN FORM INTERFACE =================
function resetForm() {
    document.getElementById("formLink").value = "";
    document.getElementById("token").value = "";
    document.getElementById("mapel").value = "";
    document.getElementById("durasi").value = "";
    document.getElementById("preview").style.backgroundImage = "";
    document.getElementById("bgFile").value = "";
    
    const btnSimpan = document.getElementById("btnSimpan");
    btnSimpan.innerText = "Simpan Data Baru";
    btnSimpan.style.background = "#007bff";
    btnSimpan.style.color = "white";
    document.getElementById("btnBatal").style.display = "none";
    
    base64Image = "";
    editRow = null;
}

// Jalankan otomatis saat halaman dirender admin
loadData();
</script>

</body>
</html>
