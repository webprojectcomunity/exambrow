<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Panel - Portal Ujian</title>
    <style>
        /* Reset & Base Styling */
        * { box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f9;
            margin: 0;
            padding: 10px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            background: white;
            padding: 15px;
            border-radius: 10px;
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h2, h3 { text-align: center; color: #333; margin-top: 0; }

        /* Form Layout */
        .form-group { margin-bottom: 12px; }
        label { font-size: 13px; font-weight: bold; color: #444; display: block; margin-bottom: 4px; }
        input { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ccc; }

        /* Responsif: Kolom menjadi vertikal di layar kecil */
        .row-inputs { display: flex; flex-direction: column; gap: 10px; }

        /* Tombol */
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px; margin-top: 5px; }
        .save-btn { background: #007bff; color: white; }
        .cancel-btn { background: #6c757d; color: white; display: none; }

        /* Manajemen Background */
        .bg-management-box { border: 1px solid #ddd; padding: 12px; border-radius: 8px; background: #fafafa; margin: 15px 0; }
        .preview { width: 100%; height: 120px; background-size: cover; background-position: center; border-radius: 6px; margin-top: 10px; border: 1px dashed #ccc; background-color: #eee; }

        /* Tabel Responsif dengan Scroll */
        .table-container { width: 100%; overflow-x: auto; margin-top: 20px; border: 1px solid #ddd; border-radius: 6px; }
        table { width: 100%; min-width: 500px; border-collapse: collapse; font-size: 12px; }
        th, td { border: 1px solid #eee; padding: 8px; text-align: center; }
        th { background-color: #f8f9fa; }
        
        .action-btn { padding: 5px 8px; font-size: 11px; margin: 1px; border-radius: 4px; }
        .edit { background: #ffc107; }
        .delete { background: #dc3545; color: white; }
    </style>
</head>

<body>

<div class="container">
    <h2>Admin Panel</h2>

    <div class="form-group">
        <label>Link Google Form</label>
        <input type="text" id="formLink" placeholder="Link Form...">
    </div>

    <div class="form-group">
        <label>Token Ujian</label>
        <input type="text" id="token" placeholder="Contoh: uas2026">
    </div>

    <div class="row-inputs">
        <div class="form-group">
            <label>Mata Pelajaran</label>
            <input type="text" id="mapel" placeholder="Nama Mapel">
        </div>
        <div class="form-group">
            <label>Durasi (Menit)</label>
            <input type="number" id="durasi" placeholder="Contoh: 90">
        </div>
    </div>

    <div class="bg-management-box">
        <label>File Background</label>
        <input type="file" id="bgFile" accept="image/*">
        <div class="preview" id="preview"></div>
    </div>

    <button class="save-btn" onclick="simpanDataTeks()">Simpan Data</button>
    <button class="cancel-btn" id="btnBatal">Batal</button>

    <h3>Data Ujian Aktif</h3>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Mapel</th>
                    <th>Durasi</th>
                    <th>Token</th>
                    <th>Link</th>
                    <th>BG</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="6">Memuat database...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
// URL Web App dari Google Apps Script
const API_URL = "https://script.google.com/macros/s/AKfycbygo9uVEhnY6M8QefD7HEQV57DWTZOE3ACPQhl6b80lvzxGuliQULaE5yKG_guqoDdyPQ/exec";

let base64Image = "";
let editRow = null;

// ================= AMBIL DATA UTAMA DARI SERVER =================
async function loadData() {
    const tableBody = document.getElementById("tableBody");
    if (!tableBody) return;
    
    try {
        const res = await fetch(`${API_URL}?action=all`);
        const data = await res.json();

        if (data.error) {
            tableBody.innerHTML = `<tr><td colspan="6" style="color:red;">Error: ${data.error}</td></tr>`;
            return;
        }

        if (data.length === 0) {
            tableBody.innerHTML = `<tr><td colspan="6">Belum ada data konfigurasi ujian di server.</td></tr>`;
            return;
        }

        tableBody.innerHTML = "";
        data.forEach(item => {
            const bgDisplay = item.background 
                ? `<a href="${item.background}" target="_blank"><img src="${item.background}" alt="BG" style="max-width:50px; max-height:50px; border-radius:4px;"></a>` 
                : `<span style="color:#999; font-style:italic;">Default</span>`;

            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td><strong>${item.mapel}</strong></td>
                <td>${item.durasi}</td>
                <td><code style="background:#eee; padding:2px 6px; border-radius:4px; font-weight:bold;">${item.token}</code></td>
                <td style="font-size:11px; color:#555;">${item.formLink}</td>
                <td>${bgDisplay}</td>
                <td>
                    <button class="action-btn edit" onclick="masukModeEdit(${item.row}, '${btoa(encodeURIComponent(item.mapel))}', '${btoa(encodeURIComponent(item.durasi))}', '${btoa(encodeURIComponent(item.token))}', '${btoa(encodeURIComponent(item.formLink))}')">Edit Teks</button>
                    <button class="action-btn delete" onclick="hapusBarisTotal(${item.row})">Hapus</button>
                    <hr style="border:0; border-top:1px dashed #ccc; margin:4px 0;">
                    <button class="action-btn bg-upload" onclick="prosesUploadBgKhusus(${item.row})">Pasang BG</button>
                    <button class="action-btn bg-delete" onclick="hapusBgKhusus(${item.row})">Kosongkan BG</button>
                </td>
            `;
            tableBody.appendChild(tr);
        });

    } catch (err) {
        console.error(err);
        tableBody.innerHTML = `<tr><td colspan="6" style="color:red;">Gagal memuat data. Periksa koneksi internet / izin Web App.</td></tr>`;
    }
}

// ================= PREVIEW & AUTO COMPRESS GAMBAR (LOKAL) =================
document.getElementById("bgFile").addEventListener("change", function(e){
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(event){
        const img = new Image();
        img.onload = function() {
            const MAX_WIDTH = 1280;
            const MAX_HEIGHT = 1280;
            let width = img.width;
            let height = img.height;

            if (width > height) {
                if (width > MAX_WIDTH) {
                    height *= MAX_WIDTH / width;
                    width = MAX_WIDTH;
                }
            } else {
                if (height > MAX_HEIGHT) {
                    width *= MAX_HEIGHT / height;
                    height = MAX_HEIGHT;
                }
            }

            const canvas = document.createElement("canvas");
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, width, height);

            base64Image = canvas.toDataURL("image/jpeg", 0.75); 
            
            document.getElementById("preview").style.backgroundImage = `url(${base64Image})`;
            console.log("Gambar berhasil dikompresi untuk kestabilan upload.");
        };
        img.src = event.target.result;
    };
    reader.readAsDataURL(file);
});

// ================= EKSEKUSI DATA TEKS (SIMPAN / UPDATE) =================
async function simpanDataTeks() {
    const formLink = document.getElementById("formLink").value.trim();
    const token = document.getElementById("token").value.trim();
    const mapel = document.getElementById("mapel").value.trim();
    const durasi = document.getElementById("durasi").value.trim();

    if (!formLink || !token || !mapel || !durasi) {
        alert("Mohon lengkapi semua bidang data teks terlebih dahulu!");
        return;
    }

    const btnSimpan = document.getElementById("btnSimpan");
    btnSimpan.disabled = true;
    btnSimpan.innerText = "Memproses...";

    // 🔥 PERBAIKAN: Menggunakan JSON payload & menyertakan 'image' langsung saat 'add'
    const payload = {
        action: editRow ? "update_text" : "add",
        formLink: formLink,
        token: token,
        mapel: mapel,
        durasi: durasi,
        image: base64Image // Sekarang otomatis terikut saat klik tombol utama
    };
    
    if (editRow) {
        payload.row = editRow;
    }

    try {
        const res = await fetch(API_URL, { 
            method: "POST", 
            headers: { "Content-Type": "text/plain;charset=utf-8" }, // Menghindari isu CORS preflight di GAS
            body: JSON.stringify(payload) 
        });
        const result = await res.text();

        if (result.includes("SUCCESS")) {
            alert(editRow ? "Data teks berhasil diperbarui!" : "Konfigurasi ujian baru & background berhasil disimpan!");
            resetForm();
            loadData();
        } else {
            alert("Respon Server: " + result);
        }
    } catch (err) {
        console.error(err);
        alert("Terjadi gangguan jaringan saat menyimpan data.");
    } finally {
        btnSimpan.disabled = false;
        btnSimpan.innerText = editRow ? "Update Teks Data" : "Simpan Data Baru";
    }
}

// ================= MASUK MODE EDIT TEKS DATA =================
function masukModeEdit(row, mapelB64, durasiB64, tokenB64, formLinkB64) {
    editRow = row;
    
    document.getElementById("mapel").value = decodeURIComponent(atob(mapelB64));
    document.getElementById("durasi").value = decodeURIComponent(atob(durasiB64));
    document.getElementById("token").value = decodeURIComponent(atob(tokenB64));
    document.getElementById("formLink").value = decodeURIComponent(atob(formLinkB64));

    const btnSimpan = document.getElementById("btnSimpan");
    btnSimpan.innerText = "Update Teks Data (Baris " + row + ")";
    btnSimpan.style.background = "#ffc107";
    btnSimpan.style.color = "black";
    
    document.getElementById("btnBatal").style.display = "block";
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ================= TERPISAH: UPLOAD/UPDATE BACKGROUND BARIS SPESIFIK =================
async function prosesUploadBgKhusus(row) {
    try {
        if (!row || isNaN(row)) {
            alert("Row tidak valid!");
            return;
        }

        if (!base64Image || typeof base64Image !== "string") {
            alert("Pilih file gambar terlebih dahulu melalui input file!");
            return;
        }

        const sizeKB = Math.round((base64Image.length * 3) / 4 / 1024);
        if (sizeKB > 2048) {
            alert("Ukuran gambar terlalu besar! Maksimal 2MB.");
            return;
        }

        if (!confirm(`Apakah Anda yakin ingin upload background ke baris ${row}?`)) {
            return;
        }

        const btnSimpan = document.getElementById("btnSimpan");
        const originalText = btnSimpan ? btnSimpan.innerText : "Simpan Data Baru";
        
        if (btnSimpan) {
            btnSimpan.disabled = true;
            btnSimpan.innerText = "Mengunggah Gambar...";
        }

        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 60000);

        // 🔥 PERBAIKAN: Menggunakan JSON payload agar data base64 stabil dan utuh
        const payload = {
            action: "upload_bg",
            row: row,
            image: base64Image
        };

        const res = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify(payload),
            signal: controller.signal
        });

        clearTimeout(timeout);

        const textResult = await res.text();
        console.log("SERVER RESPONSE:", textResult);

        if (!res.ok) {
            throw new Error(textResult || "Server error");
        }

        if (textResult.includes("SUCCESS")) {
            alert(`Sukses mengunggah background untuk baris ${row}!`);
            
            base64Image = "";
            const fileInput = document.getElementById("bgFile");
            if (fileInput) fileInput.value = "";
            const preview = document.getElementById("preview");
            if (preview) preview.style.backgroundImage = "";

            loadData();
        } else {
            alert("Gagal upload. Respon server: " + textResult);
        }

        if (btnSimpan) {
            btnSimpan.disabled = false;
            btnSimpan.innerText = originalText;
        }

    } catch (err) {
        console.error("UPLOAD ERROR:", err);
        const btnSimpan = document.getElementById("btnSimpan");
        if (btnSimpan) {
            btnSimpan.disabled = false;
            btnSimpan.innerText = "Simpan Data Baru";
        }

        if (err.name === "AbortError") {
            alert("Upload timeout! Server Google Apps Script memakan waktu terlalu lama (lebih dari 60 detik).");
        } else {
            alert("Terjadi kesalahan jaringan atau server gagal merespon.");
        }
    }
}

// ================= KOSONGKAN BACKGROUND BARIS DATA =================
async function hapusBgKhusus(row) {
    if (!confirm(`Apakah Anda yakin ingin menghapus file background pada baris ${row} dan mengembalikannya ke default?`)) return;

    const payload = { action: "delete_bg", row: row };

    try {
        const res = await fetch(API_URL, { 
            method: "POST", 
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify(payload) 
        });
        const result = await res.text();
        
        if (result.includes("SUCCESS")) {
            alert("Background berhasil dikembalikan ke default!");
            loadData();
        } else {
            alert("Gagal: " + result);
        }
    } catch (err) {
        console.error(err);
        alert("Gagal terhubung dengan server cloud.");
    }
}

// ================= TOTAL HAPUS BARIS DATA =================
async function hapusBarisTotal(row) {
    if (!confirm(`PERINGATAN: Menghapus baris data ${row} secara total? File gambar terikat juga akan dibersihkan otomatis.`)) return;

    const payload = { action: "delete", row: row };

    try {
        const res = await fetch(API_URL, { 
            method: "POST", 
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify(payload) 
        });
        const result = await res.text();
        
        if (result.includes("SUCCESS")) {
            alert("Seluruh data baris berhasil dimusnahkan!");
            if(editRow === row) resetForm();
            loadData();
        } else {
            alert("Gagal: " + result);
        }
    } catch (err) {
        console.error(err);
        alert("Gagal berkomunikasi dengan server.");
    }
}

// ================= RESET / BERSIHKAN FORM INTERFACE =================
function resetForm() {
    document.getElementById("formLink").value = "";
    document.getElementById("token").value = "";
    document.getElementById("mapel").value = "";
    document.getElementById("durasi").value = "";
    document.getElementById("preview").style.backgroundImage = "";
    document.getElementById("bgFile").value = "";
    
    const btnSimpan = document.getElementById("btnSimpan");
    if (btnSimpan) {
        btnSimpan.innerText = "Simpan Data Baru";
        btnSimpan.style.background = "#007bff";
        btnSimpan.style.color = "white";
    }
    document.getElementById("btnBatal").style.display = "none";
    
    base64Image = "";
    editRow = null;
}

// Jalankan otomatis saat halaman dirender admin
loadData();
</script>

</body>
</html>
