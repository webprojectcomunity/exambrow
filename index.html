<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Ujian</title>

<style>
body {
    font-family: Arial;
    background: #f4f4f9;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* BOX */
.box {
    background: white;
    padding: 25px;
    border-radius: 10px;
    width: 350px;
    text-align: center;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

/* INPUT */
input {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
}

/* BUTTON */
button {
    padding: 10px;
    width: 95%;
    background: #28a745;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: #218838;
}

/* UJIAN */
#exam-popup {
    display: none;
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:white;
}

iframe {
    width:100%;
    height:100%;
    border:none;
}
</style>
</head>

<body>

<!-- ================= IDENTITAS ================= -->
<div id="identitas-box" class="box">
    <h3>Identitas Siswa</h3>
    <input type="text" id="nama" placeholder="Nama">
    <input type="text" id="nis" placeholder="NIS">
    <input type="text" id="kelas" placeholder="Kelas">
    <button onclick="simpanIdentitas()">Lanjutkan</button>
</div>

<!-- ================= TOKEN ================= -->
<div id="login-container" class="box" style="display:none;">
    <h3>Masukkan Token</h3>
    <input type="text" id="token-input" placeholder="Masukkan token">
    <button onclick="verifikasiToken()">Mulai Ujian</button>
</div>

<!-- ================= UJIAN ================= -->
<div id="exam-popup">
    <iframe id="gform-iframe"></iframe>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbygo9uVEhnY6M8QefD7HEQV57DWTZOE3ACPQhl6b80lvzxGuliQULaE5yKG_guqoDdyPQ/exec";

let VALID_TOKEN = "";
let FORM_LINK = "";

// ================= LOAD DATA =================
window.onload = function () {

    // jika sudah isi identitas sebelumnya
    if (localStorage.getItem("nama")) {
        tampilToken();
    }

    fetch(API_URL + "?action=latest")
    .then(res => res.json())
    .then(data => {

        console.log("DATA SERVER:", data);

        // 🔥 NORMALISASI TOKEN (ANTI ERROR)
        VALID_TOKEN = (data.token || "")
            .toString()
            .trim()
            .replace(/\s+/g, "")
            .toLowerCase();

        FORM_LINK = data.formLink || "";

        document.getElementById("gform-iframe").src = FORM_LINK;

        // background dari admin
        if (data.background) {
            document.body.style.background =
                `url(${data.background}) no-repeat center center fixed`;
            document.body.style.backgroundSize = "cover";
        }

    })
    .catch(err => {
        console.error("Gagal load:", err);
        alert("Gagal mengambil data server!");
    });

};

// ================= SIMPAN IDENTITAS =================
function simpanIdentitas() {

    const nama = document.getElementById("nama").value.trim();
    const nis = document.getElementById("nis").value.trim();
    const kelas = document.getElementById("kelas").value.trim();

    if (!nama || !nis || !kelas) {
        alert("Lengkapi semua data!");
        return;
    }

    localStorage.setItem("nama", nama);
    localStorage.setItem("nis", nis);
    localStorage.setItem("kelas", kelas);

    tampilToken();
}

// ================= TAMPIL TOKEN =================
function tampilToken() {
    document.getElementById("identitas-box").style.display = "none";
    document.getElementById("login-container").style.display = "block";
}

// ================= VERIFIKASI TOKEN =================
function verifikasiToken() {

    const inputToken = document.getElementById("token-input").value
        .toString()
        .trim()
        .replace(/\s+/g, "")
        .toLowerCase();

    console.log("INPUT:", inputToken);
    console.log("VALID:", VALID_TOKEN);

    if (inputToken === VALID_TOKEN) {

        kirimDataSiswa(inputToken);

        document.getElementById("login-container").style.display = "none";
        document.getElementById("exam-popup").style.display = "block";

        // fullscreen aman
        document.documentElement.requestFullscreen()
            .catch(() => {});

    } else {
        alert("Token salah!");
    }
}

// ================= KIRIM DATA SISWA =================
function kirimDataSiswa(token) {

    const formData = new URLSearchParams();

    formData.append("action", "add_siswa"); // 🔥 HARUS INI
    formData.append("nama", localStorage.getItem("nama"));
    formData.append("nis", localStorage.getItem("nis"));
    formData.append("kelas", localStorage.getItem("kelas"));
    formData.append("token", token);

    fetch(API_URL, {
        method: "POST",
        body: formData
    })
    .then(res => res.text())
    .then(res => console.log("SISWA:", res))
    .catch(err => console.error(err));
}

</script>

</body>
</html>
