<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Ujian Online - Google Form Terproteksi</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #login-container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 85%;
        }

        input {
            padding: 12px;
            font-size: 16px;
            margin-bottom: 15px;
            width: 80%;
            text-align: center;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        #end-exam-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 10005;
    background-color: #ffc107;
    color: black;
    font-weight: bold;
    box-shadow: 0 4px 6px rgba(0,0,0,0.2);
}
#end-exam-btn:hover {
    background-color: #e0a800;
}

        button:hover { background-color: #218838; }

        #exam-popup {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: white;
            z-index: 9999;
        }

        iframe {
            border: none;
            width: 100%;
            height: 100%;
        }

        #refullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 10005;
            background-color: #dc3545;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        #custom-modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.8);
            z-index: 10010;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 8px;
            text-align: center;
            max-width: 400px;
            width: 80%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .modal-content h3 { color: #dc3545; margin-top: 0; }

        .modal-content button { background-color: #007bff; margin-top: 15px; }

        .modal-content button:hover { background-color: #0069d9; }

        .no-select {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
    </style>
</head>

<body class="no-select" oncontextmenu="return false;"> 

<div id="login-container">
    <h2>Masukkan Token Ujian</h2>
    <input type="text" id="token-input" placeholder="CONTOH: UJIAN123">
    <br>
    <button onclick="verifikasiToken()">Mulai Ujian</button>
</div>

<div id="exam-popup">
   <button id="end-exam-btn" onclick="konfirmasiSelesai()">Akhiri Ujian</button>

    <iframe 
        id="gform-iframe"
        src="https://docs.google.com/forms/d/e/1FAIpQLSf6YGA3jar4D4W6_ATzUP7HncdW9bpPw8xh4ou0uBDRfA7V4g/viewform?usp=header" 
        sandbox="allow-forms allow-scripts allow-same-origin allow-popups">
    </iframe>
</div>

<div id="custom-modal">
    <div class="modal-content">
        <h3>PERINGATAN PELANGGARAN!</h3>
        <p id="modal-message"></p>
        <p><strong>Sisa kesempatan: <span id="modal-chance">3</span></strong></p>
        <button onclick="tutupModalPeringatan()">Saya Mengerti</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
