<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Ujian</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f4f9;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* BOX */
.box {
    background: white;
    padding: 25px;
    border-radius: 10px;
    width: 350px;
    text-align: center;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

/* INPUT */
input {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
    box-sizing: border-box;
}

/* BUTTON */
button {
    padding: 10px;
    width: 95%;
    background: #28a745;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: #218838;
}

/* UJIAN */
#exam-popup {
    display: none;
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:white;
    z-index: 999;
}

iframe {
    width:100%;
    height:100%;
    border:none;
}

/* INFO SISWA */
#info-siswa {
    font-size: 13px;
    margin-bottom: 10px;
    color: #333;
    text-align: left;
    background: #f8f9fa;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #eee;
}

/* Kotak Dialog Peringatan Pelanggaran Kustom */
#custom-modal {
    display: none; /* Tersembunyi di awal */
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.8);
    z-index: 10000;
    justify-content: center;
    align-items: center;
    padding: 20px;
}
.modal-content {
    background: white;
    padding: 25px;
    border-radius: 10px;
    max-width: 400px;
    width: 100%;
    text-align: center;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}
.modal-content h3 { color: #dc3545; margin-top: 0; }
.modal-content p { color: #333; font-size: 15px; line-height: 1.5; }
.modal-content button { 
    background: #007bff; 
    width: auto; 
    padding: 10px 20px; 
}
.modal-content button:hover { background: #0056b3; }
</style>
</head>

<body>

<!-- ================= IDENTITAS ================= -->
<div id="identitas-box" class="box">
    <h3>Identitas Siswa</h3>
    <input type="text" id="nama" placeholder="Nama">
    <input type="text" id="nis" placeholder="NIS">
    <input type="text" id="kelas" placeholder="Kelas">
    <button onclick="simpanIdentitas()">Lanjutkan</button>
</div>

<!-- ================= TOKEN ================= -->
<div id="login-container" class="box" style="display:none;">
    <div id="info-siswa"></div>
    <h3>Masukkan Token</h3>
    <input type="text" id="token-input" placeholder="Masukkan token">
    <button onclick="verifikasiToken()">Mulai Ujian</button>
</div>

<!-- ================= UJIAN ================= -->
<div id="exam-popup">
    <iframe id="gform-iframe" allow="fullscreen"></iframe>
</div>

<!-- Kotak Dialog Peringatan Pelanggaran Kustom -->
<div id="custom-modal">
    <div class="modal-content">
        <h3>PERINGATAN PELANGGARAN!</h3>
        <p id="modal-message">Alasan pelanggaran akan muncul di sini.</p>
        <p><strong>Sisa kesempatan Anda: <span id="modal-chance">3</span> kali lagi.</strong></p>
        <button onclick="tutupModalPeringatan()">Saya Mengerti & Lanjutkan</button>
    </div>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbygo9uVEhnY6M8QefD7HEQV57DWTZOE3ACPQhl6b80lvzxGuliQULaE5yKG_guqoDdyPQ/exec";

let VALID_TOKEN = "";
let FORM_LINK = "";

// Variabel Kontrol Anti-Curang
let ujianBerjalan = false;
let batasPelanggaran = 3;

// ================= LOAD DATA =================
window.onload = function () {

    // ambil setting server
    fetch(API_URL + "?action=latest")
    .then(res => res.json())
    .then(data => {

        console.log("DATA SERVER:", data);

        VALID_TOKEN = (data.token || "")
            .toString()
            .trim()
            .replace(/\s+/g, "")
            .toLowerCase();

        FORM_LINK = data.formLink || "";
        document.getElementById("gform-iframe").src = FORM_LINK;

        if (data.background) {
            document.body.style.background =
                `url(${data.background}) no-repeat center center fixed`;
            document.body.style.backgroundSize = "cover";
        }

    });

    // ================= FLOW LOGIN =================
    const nama = localStorage.getItem("nama");
    const nis = localStorage.getItem("nis");
    const kelas = localStorage.getItem("kelas");

    if (nama && nis && kelas) {
        tampilToken();
    } else {
        document.getElementById("identitas-box").style.display = "block";
        document.getElementById("login-container").style.display = "none";
    }
};

// ================= SIMPAN IDENTITAS =================
function simpanIdentitas() {

    const nama = document.getElementById("nama").value.trim();
    const nis = document.getElementById("nis").value.trim();
    const kelas = document.getElementById("kelas").value.trim();

    if (!nama || !nis || !kelas) {
        alert("Lengkapi semua data!");
        return;
    }

    localStorage.setItem("nama", nama);
    localStorage.setItem("nis", nis);
    localStorage.setItem("kelas", kelas);

    tampilToken();
}

// ================= TAMPIL TOKEN =================
function tampilToken() {

    document.getElementById("identitas-box").style.display = "none";
    document.getElementById("login-container").style.display = "block";

    // tampilkan identitas siswa
    document.getElementById("info-siswa").innerHTML =
        "<strong>Nama:</strong> " + localStorage.getItem("nama") + "<br>" +
        "<strong>NIS:</strong> " + localStorage.getItem("nis") + "<br>" +
        "<strong>Kelas:</strong> " + localStorage.getItem("kelas");
}

// ================= VERIFIKASI TOKEN =================
function verifikasiToken() {

    const inputToken = document.getElementById("token-input").value
        .toString()
        .trim()
        .replace(/\s+/g, "")
        .toLowerCase();

    if (inputToken === VALID_TOKEN) {

        kirimDataSiswa(inputToken);

        document.getElementById("login-container").style.display = "none";
        document.getElementById("exam-popup").style.display = "block";

        // Aktifkan Pengawasan Anti-Curang dan Masuk Fullscreen
        ujianBerjalan = true;
        masukFullscreen();

    } else {
        alert("Token salah!");
    }
}

// ================= KIRIM DATA SISWA =================
function kirimDataSiswa(token) {

    const formData = new URLSearchParams();

    formData.append("action", "add_siswa");
    formData.append("nama", localStorage.getItem("nama"));
    formData.append("nis", localStorage.getItem("nis"));
    formData.append("kelas", localStorage.getItem("kelas"));
    formData.append("token", token);

    fetch(API_URL, {
        method: "POST",
        body: formData
    })
    .then(res => res.text())
    .then(res => console.log("SISWA:", res))
    .catch(err => console.error(err));
}

// ================= FUNGSI PAKSA LAYAR PENUH =================
function masukFullscreen() {
    let elem = document.documentElement;
    if (elem.requestFullscreen) {
        elem.requestFullscreen().catch(err => console.log(err));
    } else if (elem.webkitRequestFullscreen) { 
        elem.webkitRequestFullscreen(); // Khusus iOS Safari
    }
}

// ---------------- ALGORITMA ANTI-CURANG ----------------

// 1. Deteksi Pindah Tab / Pindah Aplikasi (Tombol Home, Split Screen, WhatsApp)
document.addEventListener("visibilitychange", function() {
    if (document.hidden && ujianBerjalan) {
        catatPelanggaran("Terdeteksi meminimalkan halaman, membuka aplikasi lain, atau berpindah tab!");
    }
});

// 2. Deteksi Keluar dari Mode Fullscreen
document.addEventListener('fullscreenchange', function() {
    if (!document.fullscreenElement && ujianBerjalan) {
        catatPelanggaran("Terdeteksi keluar dari mode layar penuh (Fullscreen)!");
    }
});
document.addEventListener('webkitfullscreenchange', function() { // Pelacakan khusus iOS Safari
    if (!document.webkitFullscreenElement && ujianBerjalan) {
        catatPelanggaran("Terdeteksi keluar dari mode layar penuh!");
    }
});

// 3. Sistem Pencatatan Pelanggaran dan Sanksi
function catatPelanggaran(alasan) {
    if (!ujianBerjalan) return;
    
    batasPelanggaran--;
    
    if (batasPelanggaran > 0) {
        // Tampilkan pesan lewat dialog kustom HTML
        document.getElementById('modal-message').innerText = alasan;
        document.getElementById('modal-chance').innerText = batasPelanggaran;
        document.getElementById('custom-modal').style.display = 'flex';
    } else {
        // JIKA NYAWA HABIS: DISKUALIFIKASI & TUTUP PORTAL
        ujianBerjalan = false;
        document.getElementById('custom-modal').style.display = 'none';
        portalTerkunci();
    }
}

function tutupModalPeringatan() {
    document.getElementById('custom-modal').style.display = 'none';
    // Paksa masuk layar penuh kembali setelah siswa membaca peringatan
    masukFullscreen();
}

// 4. Kunci Portal secara Otomatis
function portalTerkunci() {
    window.onbeforeunload = null; 
    
    // Hilangkan Google Form dan blokir akses siswa
    document.getElementById('exam-popup').innerHTML = '';
    document.getElementById('exam-popup').style.display = 'none';
    
    document.getElementById('identitas-box').style.display = 'none';
    
    document.getElementById('login-container').innerHTML = `
        <h2 style="color: red; font-size: 24px;">AKSES ANDA DIBLOKIR</h2>
        <p style="font-size: 16px; color: #333;">Sistem mendeteksi tindakan kecurangan berulang kali (pindah aplikasi/layar).</p>
        <p style="font-weight: bold; color: #dc3545;">Ujian Anda telah dihentikan secara otomatis.</p>
        <p style="margin-top: 20px; font-size: 14px; color: #666;">Silakan menghadap Pengawas atau Proktor di ruang ujian untuk membuka blokir.</p>
    `;
    document.getElementById('login-container').style.display = 'block';
}

// Blokir Tombol Kombinasi Desktop (Ctrl+C, Ctrl+V, F12, Ctrl+U)
document.addEventListener('keydown', function(e) {
    if (e.ctrlKey && (e.key === 'c' || e.key === 'v' || e.key === 'u' || e.key === 's')) {
        e.preventDefault();
    }
    if (e.key === 'F12') {
        e.preventDefault();
    }
});

// Konfirmasi Keamanan saat Refresh / Menutup Browser secara Sengaja
window.onbeforeunload = function() {
    if (ujianBerjalan) {
        return "Ujian sedang berlangsung! Riwayat pengerjaan Anda berisiko hilang.";
    }
};
</script>

</body>
</html>
